version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: skolr_postgres
    restart: always
    environment:
      POSTGRES_USER: skolr_user
      POSTGRES_PASSWORD: skolr_password
      POSTGRES_DB: skolr_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: skolr_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
